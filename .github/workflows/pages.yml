name: Deploy Mira PWA to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "reference-implementation/mira-pwa/**"
      - ".github/workflows/pages.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload PWA
        uses: actions/upload-pages-artifact@v3
        with:
          path: reference-implementation/mira-pwa

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4



