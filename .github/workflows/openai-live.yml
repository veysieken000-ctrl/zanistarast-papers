name: OpenAI Live Test

on:
  workflow_dispatch:

jobs:
  openai-live:
    name: Run OpenAI Live Integration Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: reference-implementation

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify secret exists
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is not configured."
            exit 1
          fi

      - name: Run OpenAI live test
        run: cargo test -p zanistarast-ai --test openai_live -- --ignored --nocapture


